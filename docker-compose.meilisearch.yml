version: "3.9"

services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: probuy-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  meilisearch_data:
